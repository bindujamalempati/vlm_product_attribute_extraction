seed: 42
train_annotations: data/sample/annotations/train.jsonl
val_annotations: data/sample/annotations/val.jsonl
image_root: data/sample/images
output_dir: outputs/run_01
max_text_len: 96
image_size: 224
batch_size: 2
epochs: 8
learning_rate: 0.0005
hidden_dim: 128
mlflow:
  enabled: false
  experiment_name: vlm_attribute_extraction
attributes:
  - category
  - primary_color
  - pattern
  - sleeve_length
  - neckline
  - length
  - material
  - style
  - closure
  - condition
  - height
